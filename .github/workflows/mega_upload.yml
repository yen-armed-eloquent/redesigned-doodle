name: IG Extractor & MEGA Upload

on:
  workflow_dispatch: 

jobs:
  extract-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: pip install requests

      - name: Create Target Directories & Fix Permissions
        run: |
          sudo mkdir -p /data/IG_Scraping/datasets
          sudo chown -R $USER:$USER /data

      - name: Install Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure Rclone for MEGA
        run: |
          rclone config create vfx mega user "enragedoatmeal6@sharebot.net" pass "zEUj2zsBGHxy"

      - name: Download Master Dataset from MEGA
        # Yahan source aur destination dono paths ko quotes mein rakha hai taake koi error na aaye
        run: |
          echo "Downloading Master Dataset file from MEGA..."
          rclone copy "vfx:/Instagram_Data/Batch_2026-04-05T23-23-17/Master_Dataset_2026-04-05T23-23-17.json" "/data/IG_Scraping/datasets/" -P

      - name: Run Extraction Script
        run: |
          echo "Running universal extractor..."
          python uni.py

      - name: Upload Extracted Data to MEGA
        run: |
          echo "Uploading results back to MEGA..."
          rclone copy "/data/IG_Scraping" "vfx:/Instagram_Extracted_Data" -P --transfers 32 --checkers 64
